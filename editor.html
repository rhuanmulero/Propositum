<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propositum | Studio</title>
    <link rel="stylesheet" href="css/main.css">
    
    <!-- Adicionado crossorigin="anonymous" para permitir a exportação -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,800;0,900;1,800&family=Inter:wght@400;500;600;700&family=PT+Serif:wght@700&display=swap" rel="stylesheet" crossorigin="anonymous">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js" crossorigin="anonymous"></script>
</head>
<body>
    
    <div class="app-layout">
        
        <!-- FIGMA LIKE TOOLBAR (Esquerda Vertical) -->
        <div class="figma-toolbar">
            <button class="tool-btn active" data-tool="pointer" title="Mover (V)"><i data-lucide="mouse-pointer-2"></i></button>
            <button class="tool-btn" data-tool="hand" title="Mão / Navegar (H / Espaço)"><i data-lucide="hand"></i></button>
            <div class="divider-h"></div>
            <button class="tool-btn" id="btnAddText" title="Texto (T)"><i data-lucide="type"></i></button>
            <button class="tool-btn" id="btnAddRect" title="Retângulo (R)"><i data-lucide="square"></i></button>
            <button class="tool-btn" id="btnAddCircle" title="Círculo (O)"><i data-lucide="circle"></i></button>
            <div class="divider-h"></div>
            <button class="tool-btn" id="btnAddCard" title="Adicionar Card"><i data-lucide="layout"></i></button>
            <button class="tool-btn" id="btnAddButton" title="Adicionar Botão"><i data-lucide="mouse-pointer-click"></i></button>
            <button class="tool-btn" id="btnAddBadge" title="Adicionar Tag/Badge"><i data-lucide="tag"></i></button>
            <div class="divider-h"></div>
            <button class="tool-btn" id="btnAddImage" title="Imagem"><i data-lucide="image"></i></button>
        </div>

        <!-- CONFIGURAÇÕES GLOBAIS (Topo Centro/Direita) -->
        <header class="floating-dock">
            <div class="dock-header">
                <h2>Propositum</h2>
            </div>
            <div class="dock-controls">
                <div class="input-wrap">
                    <i data-lucide="sparkles" class="dock-icon"></i>
                    <input type="text" id="themeInput" placeholder="Tema (Ex: Gestão)">
                </div>
                <div class="input-wrap">
                    <i data-lucide="link" class="dock-icon"></i>
                    <input type="text" id="websiteInput" placeholder="seusite.com.br">
                </div>
                <div class="input-wrap select-group">
                    <i data-lucide="layout-template" class="dock-icon"></i>
                    <select id="templateSelect">
                        <option value="layout-tech">1. Tech/Ícones</option>
                        <option value="layout-corp">2. Blocos/Notícia</option>
                        <option value="layout-minimal">3. Minimalista</option>
                        <option value="layout-neon">4. Cyber/Neon</option>
                        <option value="layout-editorial">5. Editorial</option>
                        <option value="layout-glass">6. Glassmorphism</option>
                        <option value="layout-bold">7. Brutalista</option>
                    </select>
                </div>
                <div class="divider-v"></div>
                <div class="wl-controls">
                    <div class="color-picker-wrap" title="Cor da Marca">
                        <input type="color" id="brandColor" value="#ea580c">
                    </div>
                    <div class="color-picker-wrap" title="Cor de Fundo">
                        <input type="color" id="bgColor" value="#081225">
                    </div>
                    <div class="color-picker-wrap" title="Cor do Texto">
                        <input type="color" id="textColor" value="#ffffff">
                    </div>
                    <button id="btnLogoUpload" class="btn-icon-minimal" title="Inserir Logo">
                        <i data-lucide="image-plus"></i>
                    </button>
                    <input type="file" id="logoInput" accept="image/*" hidden>
                    <input type="file" id="slideImageInput" accept="image/*" hidden>
                </div>
                <div class="divider-v"></div>
                <div class="action-buttons">
                    <button id="btnSaveDraft" class="btn-studio-secondary">
                        <i data-lucide="save" class="icon-sm"></i>
                        <span>Salvar</span>
                    </button>
                    <button id="btnGenerate" class="btn-primary">
                        <span id="btnGenText">Gerar IA</span>
                    </button>
                    <button id="btnDownload" class="btn-download" style="display: none;">
                        <i data-lucide="download"></i> Exportar
                    </button>
                </div>
            </div>
        </header>

        <!-- ÁREA DE TRABALHO (CANVAS INFINITO) -->
        <main class="workspace" id="workspace">
            <div id="canvasPlane" class="canvas-plane">
                <div id="carouselContainer" class="carousel-container">
                    <div class="empty-state">
                        <div class="empty-icon"><i data-lucide="layers" style="width: 64px; height: 64px;"></i></div>
                        <h2>Propositum 1080x1350</h2>
                        <p>Ajuste sua marca no painel superior e clique em gerar.</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- CONTROLE DE ZOOM (Figma Like) -->
        <div class="zoom-controls">
            <button id="btnZoomOut"><i data-lucide="minus"></i></button>
            <span id="zoomLevel">40%</span>
            <button id="btnZoomIn"><i data-lucide="plus"></i></button>
        </div>

        <!-- MODAIS E TOOLBARS FLUTUANTES -->
        <div id="elementToolbar" class="element-toolbar" style="display: none; white-space: nowrap; gap: 8px;">
            
            <!-- NOVAS FERRAMENTAS DE DESIGN -->
            <select id="toolbarFont" class="toolbar-btn" style="width: 100px; padding: 4px; outline: none; border: none; background: transparent; font-weight: 600; cursor: pointer;">
                <option value="'Inter', sans-serif">Inter</option>
                <option value="'Montserrat', sans-serif">Montserrat</option>
                <option value="'PT Serif', serif">PT Serif</option>
                <option value="monospace">Monospace</option>
            </select>

            <!-- NOVO: Controle de Tamanho da Fonte -->
            <input type="number" id="toolbarFontSize" class="toolbar-btn" style="width: 60px; padding: 4px; border: none; background: transparent; font-weight: 600; text-align: center; border-left: 1px solid rgba(0,0,0,0.1);" title="Tamanho da Fonte" min="8" max="250">
            
            <div style="position:relative; width:26px; height:26px; border-radius:50%; overflow:hidden; border:1px solid rgba(0,0,0,0.1); flex-shrink: 0;">
                <input type="color" id="toolbarColor" title="Cor do Elemento" style="position:absolute; top:-10px; left:-10px; width:50px; height:50px; cursor:pointer; border: none; padding: 0;">
            </div>
            
            <button id="btnToolbarGradient" class="toolbar-btn" title="Aplicar Gradiente"><i data-lucide="palette"></i></button>

            <div class="divider-v"></div>

            <button id="btnToolbarChange" class="toolbar-btn" title="Alterar Imagem"><i data-lucide="image-plus"></i></button>
            <div class="divider-v" id="divImageChange" style="display: none;"></div>

            <button id="btnToolbarLayerUp" class="toolbar-btn" title="Trazer para Frente"><i data-lucide="arrow-up-to-line"></i></button>
            <button id="btnToolbarLayerDown" class="toolbar-btn" title="Enviar para Trás"><i data-lucide="arrow-down-to-line"></i></button>
            
            <div class="divider-v"></div>
            
            <button id="btnToolbarOpacityDown" class="toolbar-btn" title="Diminuir Transparência">- <i data-lucide="blend" style="width:14px;"></i></button>
            <button id="btnToolbarOpacityUp" class="toolbar-btn" title="Aumentar Transparência">+ <i data-lucide="blend" style="width:14px;"></i></button>
            
            <div class="divider-v"></div>

            <!-- BOTÃO DE DUPLICAR E EXCLUIR -->
            <button id="btnToolbarCopy" class="toolbar-btn" title="Duplicar Elemento"><i data-lucide="copy"></i></button>
            <button id="btnToolbarDelete" class="toolbar-btn" title="Excluir"><i data-lucide="trash-2" style="color: #ff3b30;"></i></button>
            <div id="btnToolbarMove" class="toolbar-btn" title="Mover"><i data-lucide="move"></i></div>
        </div>

        <!-- NOVO: MODAL DE EXPORTAÇÃO -->
        <div id="exportModal" class="export-modal-overlay">
            <div class="export-modal-content">
                <i data-lucide="loader-2" class="spin"></i>
                <h3>Exportando seus slides</h3>
                <p>Renderizando em altíssima qualidade (4K)...</p>
                <div class="progress-bar-container">
                    <div id="exportProgressBar" class="progress-bar"></div>
                </div>
            </div>
        </div>
        
        <div id="cropModal" class="crop-modal-overlay">
            <div class="crop-modal">
                <h3 style="color: #111; font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 700;">Ajustar Imagem</h3>
                <div class="crop-workspace">
                    <img id="cropTarget" src="" style="max-width: 100%; display: block;">
                </div>
                <div class="crop-actions">
                    <button id="btnCancelCrop" class="btn-secondary">Cancelar</button>
                    <button id="btnApplyCrop" class="btn-primary" style="margin-top: 0; width: auto;">Aplicar Recorte</button>
                </div>
            </div>
        </div>

    </div>



    <!-- Script alterado para type module -->
    <script type="module" src="js/main.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
</body>
</html>
