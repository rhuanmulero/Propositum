<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propositum | Studio</title>
    <!-- Importa o Main CSS -->
    <link rel="stylesheet" href="css/main.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,800;0,900;1,800&family=Inter:wght@400;500;600;700&family=PT+Serif:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
</head>
<body>
    
    <div class="app-layout">
        
        <!-- FIGMA LIKE TOOLBAR (Topo Esquerdo) -->
        <div class="figma-toolbar">
            <button class="tool-btn active" data-tool="pointer" title="Mover (V)"><i data-lucide="mouse-pointer-2"></i></button>
            <button class="tool-btn" data-tool="hand" title="Mão / Navegar (H / Espaço)"><i data-lucide="hand"></i></button>
            <div class="toolbar-divider"></div>
            <button class="tool-btn" id="btnAddText" title="Texto (T)"><i data-lucide="type"></i></button>
            <button class="tool-btn" id="btnAddRect" title="Retângulo (R)"><i data-lucide="square"></i></button>
            <button class="tool-btn" id="btnAddCircle" title="Círculo (O)"><i data-lucide="circle"></i></button>
            <button class="tool-btn" id="btnAddImage" title="Imagem"><i data-lucide="image"></i></button>
        </div>

        <!-- CONFIGURAÇÕES GLOBAIS (Topo Centro/Direita) -->
        <header class="floating-dock">
            <div class="dock-header">
                <h2>Propositum</h2>
            </div>
            <div class="dock-controls">
                <div class="input-wrap">
                    <i data-lucide="key" class="dock-icon"></i>
                    <input type="password" id="apiKeyInput" placeholder="Gemini API">
                </div>
                <div class="input-wrap">
                    <i data-lucide="sparkles" class="dock-icon"></i>
                    <input type="text" id="themeInput" placeholder="Tema (Ex: Gestão)">
                </div>
                <div class="input-wrap">
                    <i data-lucide="link" class="dock-icon"></i>
                    <input type="text" id="websiteInput" placeholder="seusite.com.br">
                </div>
                <div class="input-wrap select-group">
                    <i data-lucide="layout-template" class="dock-icon"></i>
                    <select id="templateSelect">
                        <option value="layout-tech">1. Tech/Ícones</option>
                        <option value="layout-corp">2. Blocos/Notícia</option>
                        <option value="layout-minimal">3. Minimalista</option>
                        <option value="layout-neon">4. Cyber/Neon</option>
                        <option value="layout-editorial">5. Editorial</option>
                        <option value="layout-glass">6. Glassmorphism</option>
                        <option value="layout-bold">7. Brutalista</option>
                    </select>
                </div>
                <div class="dock-divider"></div>
                <div class="wl-controls">
                    <div class="color-picker-wrap" title="Cor da Marca">
                        <input type="color" id="brandColor" value="#ea580c">
                    </div>
                    <div class="color-picker-wrap" title="Cor de Fundo">
                        <input type="color" id="bgColor" value="#081225">
                    </div>
                    <div class="color-picker-wrap" title="Cor do Texto">
                        <input type="color" id="textColor" value="#ffffff">
                    </div>
                    <button id="btnLogoUpload" class="btn-icon-minimal" title="Inserir Logo">
                        <i data-lucide="image-plus"></i>
                    </button>
                    <input type="file" id="logoInput" accept="image/*" hidden>
                    <input type="file" id="slideImageInput" accept="image/*" hidden>
                </div>
                <div class="dock-divider"></div>
                <div class="action-buttons">
                    <button id="btnGenerate" class="btn-primary">
                        <span id="btnGenText">Gerar IA</span>
                    </button>
                    <button id="btnDownload" class="btn-download" style="display: none;">
                        <i data-lucide="download"></i> Exportar
                    </button>
                </div>
            </div>
        </header>

        <!-- ÁREA DE TRABALHO (CANVAS INFINITO) -->
        <main class="workspace" id="workspace">
            <div id="canvasPlane" class="canvas-plane">
                <div id="carouselContainer" class="carousel-container">
                    <div class="empty-state">
                        <div class="empty-icon"><i data-lucide="layers" style="width: 64px; height: 64px;"></i></div>
                        <h2>Propositum 1080x1350</h2>
                        <p>Ajuste sua marca no painel superior e clique em gerar.</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- CONTROLE DE ZOOM (Figma Like) -->
        <div class="zoom-controls">
            <button id="btnZoomOut"><i data-lucide="minus"></i></button>
            <span id="zoomLevel">40%</span>
            <button id="btnZoomIn"><i data-lucide="plus"></i></button>
        </div>

        <!-- MODAIS E TOOLBARS FLUTUANTES -->
        <div id="imageToolbar" class="image-toolbar" style="display: none;">
            <button id="btnToolbarChange" class="toolbar-btn"><i data-lucide="image-plus"></i> Alterar</button>
            <div id="btnToolbarMove" class="toolbar-btn"><i data-lucide="move"></i> Mover</div>
        </div>

        <div id="cropModal" class="crop-modal-overlay">
            <div class="crop-modal">
                <h3>Ajustar Imagem</h3>
                <div class="crop-workspace">
                    <img id="cropTarget" src="">
                </div>
                <div class="crop-actions">
                    <button id="btnCancelCrop" class="btn-secondary">Cancelar</button>
                    <button id="btnApplyCrop" class="btn-primary">Aplicar Corte</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Script alterado para type module -->
    <script type="module" src="js/main.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
