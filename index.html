<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propositum | O Studio Épico</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            perspective: 1000px;
        }

        /* 1. Ruído Cinematográfico */
        .noise {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 50; opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* 2. Luz Eterea no Fundo (Glow) */
        .ambient-light {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70vw; height: 70vw;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 60%);
            filter: blur(100px);
            z-index: 0;
            animation: pulseLight 8s ease-in-out infinite alternate;
        }

        @keyframes pulseLight {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        /* Container Principal */
        .hero-container {
            position: relative; z-index: 10;
            text-align: center;
            max-width: 1200px;
            padding: 0 20px;
        }

        /* 3. Tipografia Metálica Absurda */
        .title-mask { overflow: hidden; padding-bottom: 10px; }
        
        h1 {
            font-size: clamp(60px, 12vw, 150px);
            font-weight: 900;
            letter-spacing: -0.06em;
            line-height: 0.9;
            background: linear-gradient(180deg, #ffffff 0%, #555555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateY(100%);
            animation: revealUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        p {
            font-size: clamp(18px, 2vw, 28px);
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: -0.02em;
            margin-top: 30px;
            margin-bottom: 60px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
        }

        /* Botão Premium */
        .btn-wrapper {
            opacity: 0; transform: translateY(20px);
            animation: fadeUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
        }

        .btn-epic {
            position: relative;
            display: inline-flex; align-items: center; justify-content: center;
            padding: 20px 48px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 100px;
            color: #fff;
            font-size: 16px; font-weight: 600; letter-spacing: 0.5px;
            text-decoration: none; text-transform: uppercase;
            overflow: hidden;
            backdrop-filter: blur(20px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-epic::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-epic:hover {
            background: #fff; color: #000;
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 20px 40px rgba(255,255,255,0.15);
        }

        .btn-epic:hover::before { left: 100%; }

        /* Animações Core */
        @keyframes revealUp { to { transform: translateY(0); } }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="ambient-light"></div>

    <div class="hero-container">
        <div class="title-mask">
            <h1>PROPOSITUM</h1>
        </div>
        <p>A inteligência visual que materializa o épico.</p>
        <div class="btn-wrapper">
            <a href="dashboard.html" class="btn-epic">Acessar o Studio</a>
        </div>
    </div>
</body>
</html>
